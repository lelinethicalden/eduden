<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
<style>
body { margin: 0; background: #141414; font-family: 'Figtree', system-ui, sans-serif; color: #FAF8F2; }
a { color: #FAF8F2; text-decoration: none; }
a:hover { color: #FDC804; }
@keyframes wobble { 0%,100% { transform: rotate(-4deg); } 50% { transform: rotate(4deg); } }
</style>
</helmet>
<dc-import name="Header" active="" hint-size="100%,72px" style="position:sticky;top:0;z-index:1000"></dc-import>

<section data-screen-label="404" style="background:#141414;min-height:calc(100vh - 72px);display:flex;align-items:center;position:relative;overflow:hidden">
  <div style="position:absolute;top:-140px;right:-100px;width:420px;height:420px;border-radius:50%;background:radial-gradient(closest-side,rgba(253,200,4,0.2),transparent)"></div>
  <div style="position:absolute;bottom:-160px;left:-120px;width:420px;height:420px;border-radius:50%;background:radial-gradient(closest-side,rgba(253,200,4,0.12),transparent)"></div>
  <div style="max-width:680px;margin:0 auto;padding:clamp(48px,7vw,80px) 24px;text-align:center;width:100%;position:relative">
    <div style="font-size:clamp(90px,16vw,160px);font-weight:900;letter-spacing:-0.05em;line-height:1;color:#FDC804;display:flex;justify-content:center;align-items:center;gap:6px">
      <span>4</span><span style="display:inline-block;animation:wobble 2.4s ease-in-out infinite">📚</span><span>4</span>
    </div>
    <h1 style="margin:24px 0 0;font-size:clamp(26px,3.8vw,42px);font-weight:900;letter-spacing:-0.02em;line-height:1.1">This page went out of syllabus.</h1>
    <p style="margin:14px auto 0;max-width:380px;font-size:16.5px;line-height:1.6;color:#B8B5AD">Let's get you back to learning.</p>
    <div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:36px">
      <a href="Home.dc.html" style="background:#FDC804;color:#141414;font-weight:800;font-size:15.5px;padding:16px 30px;border-radius:999px;box-shadow:0 8px 24px rgba(253,200,4,0.3)" style-hover="background:#FBBF07;color:#141414;transform:translateY(-2px)">Go Home</a>
      <a href="Courses.dc.html" style="border:1.5px solid rgba(255,255,255,0.3);color:#FAF8F2;font-weight:700;font-size:15.5px;padding:16px 30px;border-radius:999px" style-hover="border-color:#FDC804;color:#FDC804">Explore Courses</a>
    </div>
  </div>
</section>

<dc-import name="Footer" hint-size="100%,600px"></dc-import>
</x-dc>
</body>
</html>
