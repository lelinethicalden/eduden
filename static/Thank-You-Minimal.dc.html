<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
<style>
body { margin: 0; background: #F4F2ED; font-family: 'Figtree', system-ui, sans-serif; color: #111111; }
a { color: #111111; text-decoration: none; }
a:hover { color: #111111; }
</style>
</helmet>
<dc-import name="Header-Minimal" active="" hint-size="100%,68px" style="position:sticky;top:0;z-index:1000"></dc-import>

<section data-screen-label="Thank you" style="background:#F4F2ED;min-height:calc(100vh - 68px);display:flex;align-items:center">
  <div style="max-width:760px;margin:0 auto;padding:clamp(48px,7vw,80px) 28px;text-align:center;width:100%">
    <div style="display:inline-flex;align-items:center;gap:8px;margin-bottom:28px">
      <span style="width:8px;height:8px;background:#FDC804;border-radius:2px"></span>
      <span style="font-size:12.5px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#6B6861">Inquiry submitted</span>
    </div>
    <h1 style="margin:0;font-size:clamp(36px,5.6vw,72px);font-weight:900;letter-spacing:-0.04em;text-transform:uppercase;line-height:0.95">Thank you{{ nameSuffix }}.</h1>
    <p style="margin:24px auto 0;max-width:440px;font-size:15.5px;line-height:1.65;color:#6B6861">The EduDen admissions team will contact you soon — usually within one working day — with batch dates, fees and next steps.</p>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:36px">
      <a href="Courses-Minimal.dc.html" style="background:#FFD300;color:#111111;font-weight:700;font-size:14.5px;padding:15px 30px;border-radius:999px" style-hover="background:#FDC804;color:#111111">Explore More Courses</a>
      <a href="Home-Minimal.dc.html" style="border:1px solid #C9C6BD;font-weight:600;font-size:14.5px;padding:15px 30px;border-radius:999px" style-hover="border-color:#111111">Back to Home</a>
    </div>
    <div style="position:relative;height:clamp(160px,20vw,240px);border-radius:20px;overflow:hidden;border:1px solid #E3E0D8;margin-top:44px">
      <x-import component-from-global-scope="image-slot" from="./image-slot.js" id="thankyou-team" shape="rect" placeholder="Admissions team / campus photo" hint-size="100%,220px" style="position:absolute;inset:0"></x-import>
    </div>
    <div style="margin-top:44px;border-top:1px solid #D8D5CC;padding-top:24px;font-size:14px;line-height:1.6;color:#6B6861;max-width:460px;margin-left:auto;margin-right:auto">In a hurry? Message us on <a href="#" style="font-weight:700;border-bottom:2px solid #FDC804">WhatsApp</a> and mention your inquiry — we'll bump you up the queue.</div>
  </div>
</section>

<dc-import name="Footer-Minimal" hint-size="100%,760px"></dc-import>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    let n = '';
    try { n = sessionStorage.getItem('eduden_inquiry_name') || ''; } catch (e) {}
    return { nameSuffix: n ? ', ' + n : '' };
  }
}
</script>
</body>
</html>
