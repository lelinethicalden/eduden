        <sc-for list="{{ links }}" as="l" hint-placeholder-count="8">

<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:80},&quot;active&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Home&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { mobile: false, open: false };
  componentDidMount() {
    this._onR = () => this.setState({ mobile: window.innerWidth < 1080 });
    window.addEventListener('resize', this._onR);
    this._onR();
  }
  componentWillUnmount() { window.removeEventListener('resize', this._onR); }
  renderVals() {
    const active = this.props.active ?? '';
    const links = [
      { label: 'Home', href: 'Home-Minimal.dc.html' },
      { label: 'About', href: 'About-Minimal.dc.html' },
      { label: 'Courses', href: 'Courses-Minimal.dc.html' },
      { label: 'Faculty', href: 'Faculty-Minimal.dc.html' },
      { label: "What's New", href: 'Whats-New-Minimal.dc.html' },
      { label: 'Verify', href: 'Verify-Minimal.dc.html' },
      { label: 'Placement', href: 'Placement-Minimal.dc.html' },
      { label: 'Contact', href: 'Contact-Minimal.dc.html' }
    ].map(l => ({
      ...l,
      weight: l.label === active ? 700 : 500,
      color: l.label === active ? '#111111' : '#6B6861',
      underline: l.label === active ? '#FDC804' : 'transparent'
    }));
    return {
      links,
      desktop: !this.state.mobile,
      mobile: this.state.mobile,
      open: this.state.mobile && this.state.open,
      toggle: () => this.setState(s => ({ open: !s.open })),
      close: () => this.setState({ open: false })
    };
  }
}
</script>
