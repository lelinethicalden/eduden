<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
<style>
body { margin: 0; font-family: 'Figtree', system-ui, sans-serif; background: #F4F2ED; }
a { color: #111111; text-decoration: none; }
a:hover { color: #111111; }
</style>
</helmet>
<div style="position:sticky;top:0;z-index:1000;background:rgba(244,242,237,0.92);backdrop-filter:blur(12px);border-bottom:1px solid #E3E0D8">
  <div style="max-width:1280px;margin:0 auto;padding:0 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;height:68px">
    <a href="Home-Minimal.dc.html" style="display:flex;align-items:center;flex:none">
      <img src="assets/eduden-logo.png" alt="EduDen" style="height:28px;width:auto;display:block">
    </a>
    <sc-if value="{{ desktop }}" hint-placeholder-val="{{ true }}">
      <nav style="display:flex;align-items:center;gap:26px">
        <sc-for list="{{ links }}" as="l" hint-placeholder-count="8">
          <a href="{{ l.href }}" style="font-size:13.5px;font-weight:{{ l.weight }};color:{{ l.color }};border-bottom:2px solid {{ l.underline }};padding:4px 0;white-space:nowrap" style-hover="color:#111111">{{ l.label }}</a>
        </sc-for>
      </nav>
      <a href="Enroll-Minimal.dc.html" style="flex:none;background:#111111;color:#F4F2ED;font-weight:700;font-size:13.5px;padding:11px 22px;border-radius:999px" style-hover="background:#FDC804;color:#111111">Enroll Now</a>
    </sc-if>
    <sc-if value="{{ mobile }}" hint-placeholder-val="{{ false }}">
      <button onClick="{{ toggle }}" aria-label="Menu" style="display:flex;flex-direction:column;gap:5px;justify-content:center;align-items:center;width:44px;height:44px;border-radius:999px;border:1px solid #D8D5CC;background:#fff;cursor:pointer">
        <span style="width:18px;height:2px;background:#111;display:block"></span>
        <span style="width:18px;height:2px;background:#111;display:block"></span>
      </button>
    </sc-if>
  </div>
  <sc-if value="{{ open }}" hint-placeholder-val="{{ false }}">
    <div style="border-top:1px solid #E3E0D8;background:#F4F2ED;padding:12px 24px 24px;display:flex;flex-direction:column">
      <sc-for list="{{ links }}" as="l" hint-placeholder-count="8">
        <a href="{{ l.href }}" onClick="{{ close }}" style="font-size:17px;font-weight:{{ l.weight }};color:{{ l.color }};padding:13px 4px;border-bottom:1px solid #E3E0D8">{{ l.label }}</a>
      </sc-for>
      <a href="Enroll-Minimal.dc.html" style="margin-top:16px;background:#111111;color:#F4F2ED;font-weight:700;font-size:15px;padding:15px;border-radius:999px;text-align:center">Enroll Now</a>
    </div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:80},&quot;active&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Home&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { mobile: false, open: false };
  componentDidMount() {
    this._onR = () => this.setState({ mobile: window.innerWidth < 1080 });
    window.addEventListener('resize', this._onR);
    this._onR();
  }
  componentWillUnmount() { window.removeEventListener('resize', this._onR); }
  renderVals() {
    const active = this.props.active ?? '';
    const links = [
      { label: 'Home', href: 'Home-Minimal.dc.html' },
      { label: 'About', href: 'About-Minimal.dc.html' },
      { label: 'Courses', href: 'Courses-Minimal.dc.html' },
      { label: 'Faculty', href: 'Faculty-Minimal.dc.html' },
      { label: "What's New", href: 'Whats-New-Minimal.dc.html' },
      { label: 'Verify', href: 'Verify-Minimal.dc.html' },
      { label: 'Placement', href: 'Placement-Minimal.dc.html' },
      { label: 'Contact', href: 'Contact-Minimal.dc.html' }
    ].map(l => ({
      ...l,
      weight: l.label === active ? 700 : 500,
      color: l.label === active ? '#111111' : '#6B6861',
      underline: l.label === active ? '#FDC804' : 'transparent'
    }));
    return {
      links,
      desktop: !this.state.mobile,
      mobile: this.state.mobile,
      open: this.state.mobile && this.state.open,
      toggle: () => this.setState(s => ({ open: !s.open })),
      close: () => this.setState({ open: false })
    };
  }
}
</script>
</body>
</html>
