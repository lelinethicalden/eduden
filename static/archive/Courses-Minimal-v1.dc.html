<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
<style>
body { margin: 0; background: #F4F2ED; font-family: 'Figtree', system-ui, sans-serif; color: #111111; }
a { color: #111111; text-decoration: none; }
a:hover { color: #111111; }
</style>
</helmet>
<dc-import name="Header-Minimal" active="Courses" hint-size="100%,68px" style="position:sticky;top:0;z-index:1000"></dc-import>

<section data-screen-label="Courses hero" style="background:#F4F2ED">
  <div style="max-width:1280px;margin:0 auto;padding:clamp(56px,8vw,96px) 28px 40px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:24px">
      <span style="width:8px;height:8px;background:#FDC804;border-radius:2px"></span>
      <span style="font-size:12.5px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#6B6861">All courses</span>
    </div>
    <h1 style="margin:0;font-size:clamp(40px,6.4vw,88px);font-weight:900;letter-spacing:-0.04em;text-transform:uppercase;line-height:0.95;max-width:900px">Find your course.</h1>
    <div style="display:flex;flex-wrap:wrap;gap:16px;align-items:center;justify-content:space-between;margin-top:40px">
      <div style="display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #E3E0D8;border-radius:999px;padding:6px 6px 6px 20px;max-width:460px;flex:1;min-width:260px">
        <input value="{{ query }}" onChange="{{ setQuery }}" placeholder="Search — hacking, python, cloud…" style="flex:1;border:none;outline:none;font-family:inherit;font-size:14.5px;color:#111111;background:transparent;min-width:0">
        <sc-if value="{{ hasQuery }}" hint-placeholder-val="{{ false }}">
          <button onClick="{{ clearQuery }}" style="flex:none;border:none;background:#F4F2ED;color:#111111;width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:13px;font-weight:700">✕</button>
        </sc-if>
      </div>
      <div style="font-size:13px;font-weight:600;color:#6B6861">{{ countLabel }}</div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:20px">
      <sc-for list="{{ filters }}" as="f" hint-placeholder-count="8">
        <button onClick="{{ f.select }}" style="border:1px solid {{ f.border }};background:{{ f.bg }};color:{{ f.color }};font-family:inherit;font-size:13px;font-weight:600;padding:9px 16px;border-radius:999px;cursor:pointer" style-hover="border-color:#111111">{{ f.name }}</button>
      </sc-for>
    </div>
  </div>
</section>

<section data-screen-label="Course list" style="background:#F4F2ED">
  <div style="max-width:1280px;margin:0 auto;padding:8px 28px clamp(64px,8vw,96px)">
    <sc-if value="{{ hasResults }}" hint-placeholder-val="{{ true }}">
      <div style="border-top:1px solid #D8D5CC">
        <sc-for list="{{ results }}" as="c" hint-placeholder-count="8">
          <a href="{{ c.href }}" style="display:grid;grid-template-columns:minmax(200px,1.6fr) minmax(140px,1fr) minmax(200px,1.6fr) auto;gap:20px;align-items:center;border-bottom:1px solid #D8D5CC;padding:26px 4px;color:#111111" style-hover="background:#fff;color:#111111">
            <div>
              <div style="font-size:11.5px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#6B6861;margin-bottom:6px">{{ c.cat }}</div>
              <div style="font-size:clamp(17px,1.8vw,22px);font-weight:800;letter-spacing:-0.015em;line-height:1.2">{{ c.title }}</div>
            </div>
            <div style="font-size:13px;font-weight:600;color:#6B6861">{{ c.meta }}</div>
            <p style="margin:0;font-size:13.5px;line-height:1.55;color:#6B6861">{{ c.blurb }}</p>
            <div style="display:flex;align-items:center;gap:10px;justify-self:end">
              <sc-if value="{{ c.tag }}" hint-placeholder-val="{{ false }}">
                <span style="font-size:11.5px;font-weight:700;background:#FDC804;padding:4px 11px;border-radius:999px;white-space:nowrap">{{ c.tag }}</span>
              </sc-if>
              <span style="flex:none;width:38px;height:38px;border-radius:50%;border:1px solid #C9C6BD;display:flex;align-items:center;justify-content:center;font-size:15px">↗</span>
            </div>
          </a>
        </sc-for>
      </div>
    </sc-if>
    <sc-if value="{{ noResults }}" hint-placeholder-val="{{ false }}">
      <div style="text-align:center;padding:72px 24px;border:1px dashed #C9C6BD;border-radius:20px">
        <div style="font-size:20px;font-weight:800">No courses match that search.</div>
        <p style="margin:8px auto 22px;font-size:14px;color:#6B6861;max-width:360px">Try a different keyword or category.</p>
        <button onClick="{{ resetAll }}" style="border:none;background:#111111;color:#F4F2ED;font-family:inherit;font-weight:700;font-size:14px;padding:13px 26px;border-radius:999px;cursor:pointer" style-hover="background:#FDC804;color:#111111">Clear filters</button>
      </div>
    </sc-if>
  </div>
</section>

<dc-import name="Footer-Minimal" hint-size="100%,760px"></dc-import>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { query: '', cat: 'All' };
  renderVals() {
    const MGMT = 'Course-Detail-Mgmt-Minimal.dc.html';
    const COURSES = [
      { cat: 'AI & Tech for Non-Tech Careers', title: 'Business Analytics and MIS Reporting with Excel, SQL and Power BI', meta: '90 days · 50+ lectures · Classroom', tag: 'New', href: MGMT, blurb: 'Every company runs on reports. Build dashboards with Excel, SQL and Power BI — made for MBA, BBA, Commerce and Arts students. No coding needed.' },
      { cat: 'AI & Tech for Non-Tech Careers', title: 'AI for Business Strategy and Decision Making', meta: '60 days · 40+ lectures · Hybrid', tag: 'New', href: MGMT, blurb: 'AI is not only for coders. Use AI for market research, competitor analysis, campaign planning and faster business decisions.' },
      { cat: 'AI & Tech for Non-Tech Careers', title: 'Product Management and Digital Business with AI', meta: '90 days · 50+ lectures · Hybrid', tag: 'New', href: MGMT, blurb: 'Work in tech without becoming a developer — user research, PRDs, wireframes, product metrics and AI-supported documentation.' },
      { cat: 'AI & Tech for Non-Tech Careers', title: 'GeoAI, GIS and Location Intelligence', meta: '90 days · 50+ lectures · Hybrid', tag: 'New', href: MGMT, blurb: 'For Geography and Environmental Science students: QGIS, satellite imagery, spatial analysis and location-based projects.' },
      { cat: 'AI & Tech for Non-Tech Careers', title: 'Cyber GRC, Risk and Data Privacy', meta: '90 days · 45+ lectures · Hybrid', tag: 'New', href: MGMT, blurb: 'Enter cybersecurity through governance, risk and compliance — policies, risk registers, audits and privacy. No hacking or coding.' },
      { cat: 'AI & Tech for Non-Tech Careers', title: 'Economics, Policy and Development Analytics with AI', meta: '60 days · 36+ lectures · Hybrid', tag: 'New', href: MGMT, blurb: 'For Economics and Social Science students: public datasets, indicators, dashboards and AI-assisted policy briefs.' },
      { cat: 'AI & Tech for Non-Tech Careers', title: 'Digital Business Operations and No Code Automation with AI', meta: '60 days · 36+ lectures · Hybrid', tag: 'New', href: MGMT, blurb: 'Automate forms, sheets, reports and follow-ups with AI and no-code tools — for operations, HR and startup coordination roles.' },
      { cat: 'Cyber Security', title: 'Ethical Hacking for Beginners', meta: '45 days · 40 lectures · Hybrid', tag: 'Bestseller', blurb: 'Legally break into systems, find security flaws, and help companies fix them — from absolute zero.' },
      { cat: 'Cyber Security', title: 'Start Bug Bounty Hunting', meta: '50 days · 45 lectures · Online', tag: '', blurb: 'From recon to reporting — the complete roadmap for HackerOne, Bugcrowd and Synack.' },
      { cat: 'Cyber Security', title: 'Digital Forensics', meta: '90 days · 70 lectures · Hybrid', tag: 'New batch', blurb: 'Uncover hidden data, trace cybercrimes, and recover digital evidence using industry-standard tools.' },
      { cat: 'Cyber Security', title: 'Android App Penetration Testing', meta: '30 days · 26 lectures · Online', tag: '', blurb: 'Reverse-engineer APKs, intercept traffic, and test apps against the OWASP Mobile Top 10.' },
      { cat: 'Cyber Security', title: 'Advanced Network Pentesting', meta: '75 days · 60 lectures · Online', tag: '', blurb: 'Custom scripting with Python & Bash, exploitation, evasion and lateral movement.' },
      { cat: 'Artificial Intelligence', title: 'AI Foundations with Python', meta: '60 days · 50 lectures · Hybrid', tag: '', blurb: 'From neural nets to real deployments — build AI features you can actually ship.' },
      { cat: 'Machine Learning', title: 'Machine Learning Bootcamp', meta: '60 days · 48 lectures · Online', tag: '', blurb: 'Regression to recommendation engines — trained on real datasets, verified by mentors.' },
      { cat: 'Data Science', title: 'Data Science with Python', meta: '75 days · 58 lectures · Hybrid', tag: '', blurb: 'Pandas, SQL, visualization and storytelling with data — a complete analyst toolkit.' },
      { cat: 'Programming', title: 'Full-Stack Web Development', meta: '90 days · 75 lectures · Hybrid', tag: '', blurb: 'HTML to deployed apps: JavaScript, React, Node and databases with portfolio projects.' },
      { cat: 'Cloud Computing', title: 'Cloud Computing with AWS', meta: '45 days · 38 lectures · Online', tag: '', blurb: 'Architect, deploy and secure real workloads on AWS — aligned to certification paths.' },
      { cat: 'DevOps', title: 'DevOps Essentials', meta: '50 days · 42 lectures · Online', tag: '', blurb: 'CI/CD, Docker, Kubernetes and infrastructure-as-code — the modern delivery pipeline.' },
      { cat: 'Linux', title: 'Linux Administration', meta: '30 days · 28 lectures · Classroom', tag: '', blurb: 'Command line to server hardening — the foundation every tech career is built on.' },
      { cat: 'Graphics Design', title: 'Graphics Design Pro', meta: '60 days · 44 lectures · Hybrid', tag: '', blurb: 'Branding, layout and visual systems with real client-style briefs and portfolio reviews.' },
      { cat: 'Digital Marketing', title: 'Digital Marketing Launchpad', meta: '45 days · 36 lectures · Online', tag: '', blurb: 'SEO, ads, analytics and content strategy — run real campaigns, measure real results.' },
      { cat: 'Blockchain', title: 'Blockchain & Web3 Basics', meta: '40 days · 32 lectures · Online', tag: '', blurb: 'Smart contracts, wallets and dApps — understand the tech behind the hype.' },
      { cat: 'IoT', title: 'IoT with Arduino & Raspberry Pi', meta: '40 days · 30 lectures · Classroom', tag: '', blurb: 'Build connected devices from scratch — sensors, boards, and cloud dashboards.' },
      { cat: 'Networking', title: 'Networking Fundamentals', meta: '35 days · 30 lectures · Hybrid', tag: '', blurb: 'TCP/IP, routing, and packet analysis — the plumbing of the internet, demystified.' }
    ];
    const cats = ['All', ...Array.from(new Set(COURSES.map(c => c.cat)))];
    const q = this.state.query.trim().toLowerCase();
    const results = COURSES.filter(c =>
      (this.state.cat === 'All' || c.cat === this.state.cat) &&
      (!q || (c.title + ' ' + c.cat + ' ' + c.blurb).toLowerCase().includes(q))
    ).map(c => ({ ...c, href: c.href || 'Course-Detail-Minimal.dc.html' }));
    const filters = cats.map(name => {
      const on = this.state.cat === name;
      return { name, bg: on ? '#111111' : '#fff', color: on ? '#F4F2ED' : '#6B6861', border: on ? '#111111' : '#E3E0D8', select: () => this.setState({ cat: name }) };
    });
    return {
      query: this.state.query,
      hasQuery: !!this.state.query,
      setQuery: e => this.setState({ query: e.target.value }),
      clearQuery: () => this.setState({ query: '' }),
      resetAll: () => this.setState({ query: '', cat: 'All' }),
      filters, results,
      hasResults: results.length > 0,
      noResults: results.length === 0,
      countLabel: results.length + (results.length === 1 ? ' course' : ' courses') + (this.state.cat !== 'All' ? ' · ' + this.state.cat : '')
    };
  }
}
</script>
</body>
</html>
