<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<template id="__bundler_thumbnail" data-bg-color="#FAF8F2">
<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
<rect width="1200" height="300" fill="#FAF8F2"/>
<rect x="60" y="110" width="200" height="80" rx="20" fill="#141414"/>
<text x="160" y="165" font-family="sans-serif" font-size="44" font-weight="900" fill="#FDC804" text-anchor="middle">ED</text>
<rect x="340" y="135" width="90" height="30" rx="15" fill="#E3E0D8"/>
<rect x="450" y="135" width="90" height="30" rx="15" fill="#E3E0D8"/>
<rect x="560" y="135" width="90" height="30" rx="15" fill="#E3E0D8"/>
<rect x="670" y="135" width="90" height="30" rx="15" fill="#E3E0D8"/>
<rect x="960" y="120" width="180" height="60" rx="30" fill="#FDC804"/>
</svg>
</template>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
<style>
body { margin: 0; font-family: 'Figtree', system-ui, sans-serif; background: #FAF8F2; }
a { color: #141414; text-decoration: none; }
a:hover { color: #B98E00; }
</style>
</helmet>
<div style="position:sticky;top:0;z-index:1000;background:rgba(250,248,242,0.92);backdrop-filter:blur(14px);border-bottom:1px solid rgba(20,20,20,0.08)">
  <div style="max-width:1240px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;height:72px">
    <a href="Home.dc.html" style="display:flex;align-items:center;flex:none">
      <img src="assets/eduden-logo.png" alt="eduden" style="height:36px;width:auto;display:block">
    </a>
    <sc-if value="{{ desktop }}" hint-placeholder-val="{{ true }}">
      <nav style="display:flex;align-items:center;gap:2px">
        <sc-for list="{{ links }}" as="l" hint-placeholder-count="8">
          <a href="{{ l.href }}" style="font-size:14.5px;font-weight:{{ l.weight }};color:{{ l.color }};padding:8px 11px;border-radius:999px;background:{{ l.bg }};white-space:nowrap" style-hover="color:#141414;background:rgba(253,200,4,0.18)">{{ l.label }}</a>
        </sc-for>
      </nav>
      <a href="Enroll.dc.html" style="flex:none;background:#FDC804;color:#141414;font-weight:800;font-size:14.5px;padding:11px 22px;border-radius:999px;box-shadow:0 1px 0 rgba(20,20,20,0.2) inset, 0 4px 14px rgba(253,200,4,0.35)" style-hover="background:#FBBF07;transform:translateY(-1px);color:#141414">Enroll Now</a>
    </sc-if>
    <sc-if value="{{ mobile }}" hint-placeholder-val="{{ false }}">
      <button onClick="{{ toggle }}" aria-label="Menu" style="display:flex;flex-direction:column;gap:5px;justify-content:center;align-items:center;width:46px;height:46px;border-radius:14px;border:1.5px solid rgba(20,20,20,0.14);background:#fff;cursor:pointer">
        <span style="width:20px;height:2.5px;border-radius:2px;background:#141414;display:block"></span>
        <span style="width:20px;height:2.5px;border-radius:2px;background:#141414;display:block"></span>
        <span style="width:14px;height:2.5px;border-radius:2px;background:#FDC804;display:block;align-self:flex-start;margin-left:13px"></span>
      </button>
    </sc-if>
  </div>
  <sc-if value="{{ open }}" hint-placeholder-val="{{ false }}">
    <div style="border-top:1px solid rgba(20,20,20,0.08);background:#FAF8F2;padding:14px 20px 22px;display:flex;flex-direction:column;gap:4px;box-shadow:0 24px 40px rgba(20,20,20,0.12)">
      <sc-for list="{{ links }}" as="l" hint-placeholder-count="8">
        <a href="{{ l.href }}" onClick="{{ close }}" style="font-size:17px;font-weight:{{ l.weight }};color:{{ l.color }};padding:13px 14px;border-radius:14px;background:{{ l.bg }}">{{ l.label }}</a>
      </sc-for>
      <a href="Enroll.dc.html" style="margin-top:10px;background:#FDC804;color:#141414;font-weight:800;font-size:16px;padding:15px;border-radius:999px;text-align:center">Enroll Now</a>
    </div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:90},&quot;active&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Home&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { mobile: false, open: false };
  componentDidMount() {
    this._onR = () => this.setState({ mobile: window.innerWidth < 1060 });
    window.addEventListener('resize', this._onR);
    this._onR();
  }
  componentWillUnmount() { window.removeEventListener('resize', this._onR); }
  renderVals() {
    const active = this.props.active ?? '';
    const links = [
      { label: 'Home', href: 'Home.dc.html' },
      { label: 'About Us', href: 'About.dc.html' },
      { label: 'Courses', href: 'Courses.dc.html' },
      { label: 'Faculty', href: 'Faculty.dc.html' },
      { label: "What's New", href: 'Whats-New.dc.html' },
      { label: 'Verify', href: 'Verify.dc.html' },
      { label: 'Placement', href: 'Placement.dc.html' },
      { label: 'Contact Us', href: 'Contact.dc.html' }
    ].map(l => ({
      ...l,
      weight: l.label === active ? 800 : 500,
      color: l.label === active ? '#141414' : '#5C5A54',
      bg: l.label === active ? 'rgba(253,200,4,0.28)' : 'transparent'
    }));
    return {
      links,
      desktop: !this.state.mobile,
      mobile: this.state.mobile,
      open: this.state.mobile && this.state.open,
      toggle: () => this.setState(s => ({ open: !s.open })),
      close: () => this.setState({ open: false })
    };
  }
}
</script>
</body>
</html>
